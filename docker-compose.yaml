version: '3.9'
services:
  aggregator_hotels:
    build: .
    environment:
      - HTTP_API_PORT=${HTTP_API_PORT}
      - MONGODB_UR=${MONGODB_UR}
      - PASSWORD_SALT=${PASSWORD_SALT}
      - SESSION_SECRET=${SESSION_SECRET}
    ports:
      - ${HTTP_API_PORT}:3000
    depends_on:
      - mongo
  mongo:
    image: mongo
    restart: always
    ports:
      - 27017:27017
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    env_file:
      - .env
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://${DB_USERNAME}:${DB_PASSWORD}@mongo:27017/
      - ME_CONFIG_BASICAUTH_ENABLED=true
      - ME_CONFIG_BASICAUTH_USERNAME=${DB_AUTH_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${DB_AUTH_PASSWORD}
